name: Discover companies

# Weekly: mine public internship datasets for new company/ATS tokens and probe
# the curated candidates, growing data/companies.json on its own. The regular
# update run then starts polling whatever this finds.
on:
  schedule:
    - cron: "0 8 * * 1"     # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: discover-companies
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover + harvest
        run: |
          python run.py discover
          python run.py harvest

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/companies.json
          if git diff --staged --quiet; then
            echo "No new companies."
          else
            git commit -m "chore: discover new companies ($(date -u +'%Y-%m-%d'))"
            git push
          fi
